<div class="min-h-screen bg-[#0a0e1a] flex items-center justify-center px-4
            relative overflow-hidden">

  <!-- Background glow effects -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-600/10 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-violet-600/10 rounded-full blur-3xl pointer-events-none"></div>

  <div class="w-full max-w-2xl page-enter">

    <!-- Header -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl
                  bg-gradient-to-br from-indigo-500 to-violet-600 mb-5 shadow-2xl
                  shadow-indigo-500/30">
        <i class="fas fa-bolt text-white text-2xl" aria-hidden="true"></i>
      </div>
      <h1 class="text-3xl font-bold text-white mb-2">Welcome to CorpAdmin</h1>
      <p class="text-slate-400">Enterprise Management Platform</p>

      <!-- Demo mode badge -->
      <div class="inline-flex items-center gap-2 mt-4 px-4 py-2 rounded-full
                  bg-amber-500/10 border border-amber-500/30 text-amber-400 text-sm font-medium">
        <i class="fas fa-flask text-xs" aria-hidden="true"></i>
        Demo Mode — Select a role to explore
      </div>
    </div>

    <!-- Role cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <button *ngFor="let demo of demoRoles"
              (click)="loginAs(demo.role)"
              class="glass-card p-5 text-left border transition-all duration-300
                     group cursor-pointer active:scale-[0.98] focus:outline-none
                     focus:ring-2 focus:ring-indigo-500"
              [class]="'glass-card p-5 text-left border transition-all duration-300 ' + demo.color"
              type="button"
              [attr.aria-label]="'Login as ' + demo.name">
        <div class="flex items-start gap-4">
          <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center
                      flex-shrink-0 group-hover:scale-110 transition-transform duration-300">
            <i [class]="'fas ' + demo.icon + ' text-slate-300'" aria-hidden="true"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-slate-100 text-sm">{{ demo.name }}</p>
            <p class="text-xs text-slate-500 mt-0.5">{{ demo.email }}</p>
            <span class="inline-block mt-2 text-xs font-semibold text-slate-400
                         bg-white/5 px-2 py-0.5 rounded capitalize">
              {{ demo.role.replace('_', ' ') }}
            </span>
          </div>
        </div>
        <p class="text-xs text-slate-500 mt-3 leading-relaxed">
          {{ demo.description }}
        </p>
        <div class="mt-3 flex items-center gap-1.5 text-xs font-semibold text-indigo-400
                    group-hover:gap-2.5 transition-all duration-200">
          <span>Sign in as this role</span>
          <i class="fas fa-arrow-right text-xs" aria-hidden="true"></i>
        </div>
      </button>
    </div>

    <p class="text-center text-slate-600 text-xs mt-8">
      This is a demonstration environment. No real data is stored or transmitted.
    </p>
  </div>
</div>
