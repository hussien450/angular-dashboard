<aside
  class="fixed top-0 left-0 h-screen bg-slate-900/95 backdrop-blur-sm border-r border-white/10
         flex flex-col z-40 transition-all duration-300 ease-in-out"
  [class.w-64]="!collapsed"
  [class.w-16]="collapsed">

  <!-- Logo -->
  <div class="flex items-center gap-3 px-4 py-5 border-b border-white/10 min-h-[72px]">
    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-violet-600
                flex items-center justify-center flex-shrink-0">
      <i class="fas fa-bolt text-white text-sm" aria-hidden="true"></i>
    </div>
    <span *ngIf="!collapsed"
          class="text-lg font-bold text-gradient whitespace-nowrap overflow-hidden">
      CorpAdmin
    </span>
  </div>

  <!-- Nav Items -->
  <nav class="flex-1 overflow-y-auto py-4 px-2 space-y-1" aria-label="Main navigation">
    <a *ngFor="let item of navItems"
       [routerLink]="item.route"
       class="flex items-center gap-3 px-3 py-2.5 rounded-xl
              transition-all duration-200 group relative"
       [class]="isActive(item.route)
         ? 'flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-200 group relative bg-indigo-600 text-white shadow-lg'
         : 'flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-200 group relative text-slate-400 hover:bg-white/10 hover:text-slate-200'"
       [attr.aria-current]="isActive(item.route) ? 'page' : null"
       [attr.title]="collapsed ? item.label : null">

      <i [class]="'fas ' + item.icon + ' w-5 text-center flex-shrink-0 text-base'"
         aria-hidden="true"></i>

      <span *ngIf="!collapsed"
            class="text-sm font-medium whitespace-nowrap overflow-hidden transition-all">
        {{ item.label }}
      </span>

      <!-- Active dot when collapsed -->
      <span *ngIf="isActive(item.route) && collapsed"
            class="absolute right-1 top-1/2 -translate-y-1/2 w-1.5 h-1.5
                   rounded-full bg-white"></span>
    </a>
  </nav>

  <!-- Collapse toggle -->
  <div class="px-2 pb-2 border-t border-white/10 pt-2">
    <button (click)="toggleCollapse()"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl
                   text-slate-400 hover:bg-white/10 hover:text-slate-200
                   transition-all duration-200"
            [attr.aria-label]="collapsed ? 'Expand sidebar' : 'Collapse sidebar'">
      <i class="fas w-5 text-center text-base flex-shrink-0"
         [class.fa-chevron-right]="collapsed"
         [class.fa-chevron-left]="!collapsed"
         aria-hidden="true"></i>
      <span *ngIf="!collapsed" class="text-sm font-medium">Collapse</span>
    </button>
  </div>

  <!-- User section -->
  <div *ngIf="currentUser"
       class="px-3 py-4 border-t border-white/10 flex items-center gap-3">
    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-violet-600
                flex items-center justify-center flex-shrink-0 text-white text-xs font-bold">
      {{ currentUser.initials }}
    </div>
    <div *ngIf="!collapsed" class="flex-1 min-w-0">
      <p class="text-sm font-semibold text-slate-200 truncate">{{ currentUser.name }}</p>
      <p class="text-xs text-slate-500 capitalize truncate">{{ getRoleLabel(currentUser.role) }}</p>
    </div>
    <button *ngIf="!collapsed"
            (click)="logout()"
            class="text-slate-400 hover:text-red-400 transition-colors duration-200 flex-shrink-0"
            aria-label="Logout">
      <i class="fas fa-arrow-right-from-bracket text-sm" aria-hidden="true"></i>
    </button>
  </div>
</aside>
