<header class="fixed top-0 right-0 h-[72px] bg-slate-900/80 backdrop-blur-sm
              border-b border-white/10 flex items-center justify-between
              px-6 z-30 transition-all duration-300"
        [class.left-64]="!sidebarCollapsed"
        [class.left-16]="sidebarCollapsed">

  <!-- Page Title -->
  <div>
    <h1 class="text-lg font-bold text-slate-100">{{ pageTitle }}</h1>
    <p class="text-xs text-slate-500">
      {{ currentUser ? getRoleLabel(currentUser.role) : '' }} · CorpAdmin Platform
    </p>
  </div>

  <!-- Right actions -->
  <div class="flex items-center gap-3">

    <!-- Notification Bell -->
    <button class="relative w-9 h-9 rounded-xl bg-white/5 hover:bg-white/10
                   flex items-center justify-center text-slate-400 hover:text-slate-200
                   transition-all duration-200"
            aria-label="Notifications">
      <i class="fas fa-bell text-sm" aria-hidden="true"></i>
      <span class="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-indigo-500
                   ring-2 ring-slate-900"></span>
    </button>

    <!-- User Menu -->
    <div class="relative">
      <button (click)="toggleUserMenu()"
              class="flex items-center gap-2 pl-1 pr-3 py-1 rounded-xl
                     bg-white/5 hover:bg-white/10 transition-all duration-200"
              aria-haspopup="true"
              [attr.aria-expanded]="showUserMenu">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-violet-600
                    flex items-center justify-center text-white text-xs font-bold">
          {{ currentUser?.initials }}
        </div>
        <span class="text-sm font-medium text-slate-200 hidden sm:block">
          {{ currentUser?.name }}
        </span>
        <i class="fas fa-chevron-down text-xs text-slate-400 transition-transform duration-200"
           [class.rotate-180]="showUserMenu"
           aria-hidden="true"></i>
      </button>

      <!-- Dropdown -->
      <div *ngIf="showUserMenu"
           class="absolute right-0 top-full mt-2 w-56 glass-card shadow-2xl shadow-black/40
                  py-1 z-50 animate-[fadeIn_0.15s_ease-out]">
        <div class="px-4 py-3 border-b border-white/10">
          <p class="text-sm font-semibold text-slate-200">{{ currentUser?.name }}</p>
          <p class="text-xs text-slate-500 mt-0.5">{{ currentUser?.email }}</p>
          <span class="inline-block mt-1.5 px-2 py-0.5 rounded-full text-xs font-semibold
                       bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 capitalize">
            {{ getRoleLabel(currentUser?.role ?? '') }}
          </span>
        </div>
        <button (click)="logout()"
                class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-400
                       hover:bg-red-500/10 transition-colors duration-150">
          <i class="fas fa-arrow-right-from-bracket" aria-hidden="true"></i>
          Sign out
        </button>
      </div>
    </div>
  </div>
</header>
